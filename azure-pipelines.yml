# Azure DevOps -> Vercel deploy pipeline
# ---------------------------------------------------------------------------
# Vercel has no native Azure DevOps Git integration, so this pipeline deploys
# the site with the Vercel CLI on every push to `main`.
#
# ONE-TIME SETUP (Azure DevOps -> Pipelines -> this pipeline -> Edit -> Variables,
# or a Variable Group). Add these three, marking VERCEL_TOKEN as secret:
#
#   VERCEL_TOKEN       Vercel -> Account Settings -> Tokens -> Create Token
#   VERCEL_ORG_ID      from .vercel/project.json after running `vercel link`
#   VERCEL_PROJECT_ID  from .vercel/project.json after running `vercel link`
#
# To get the ORG/PROJECT IDs, run once on your machine (installs nothing global
# permanently — npx fetches it on demand):
#   npx vercel@latest login
#   npx vercel@latest link          # pick the existing Lumenore project
#   cat .vercel/project.json        # copy orgId + projectId
# (.vercel/ is gitignored — do not commit it.)
# ---------------------------------------------------------------------------

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Use Node 20'

  - script: npm install --global vercel@latest
    displayName: 'Install Vercel CLI'

  - script: vercel pull --yes --environment=production --token=$(VERCEL_TOKEN)
    displayName: 'Pull Vercel project settings'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

  - script: vercel build --prod --token=$(VERCEL_TOKEN)
    displayName: 'Build (static)'

  - script: vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
    displayName: 'Deploy to production'
